env:
  contexts:
    - name: "Juice Shop Auth"
      urls:
        - "http://localhost:3000"
      includePaths:
        - "http://localhost:3000.*"
      authentication:
        method: "json"
        parameters:
          loginPageUrl: "http://localhost:3000/#/login"
          loginRequestUrl: "http://localhost:3000/rest/user/login"
          loginRequestBody: '{"email":"admin@juice-sh.op","password":"admin123"}'
        verification:
          method: "response"
          loggedInRegex: "authentication|token"
          loggedOutRegex: "Invalid email or password"
      sessionManagement:
        method: "cookie"
      users:
        - name: "admin"
          credentials:
            username: "admin@juice-sh.op"
            password: "admin123"
  parameters:
    failOnError: false
    failOnWarning: false
    progressToStdout: true

jobs:
  - type: spider
    parameters:
      context: "Juice Shop Auth"
      user: "admin"
      url: "http://localhost:3000"
      maxDuration: 5

  - type: spiderAjax
    parameters:
      context: "Juice Shop Auth"
      user: "admin"
      url: "http://localhost:3000"
      maxDuration: 10

  - type: passiveScan-wait
    parameters:
      maxDuration: 5

  - type: activeScan
    parameters:
      context: "Juice Shop Auth"
      user: "admin"
      policy: "Default Policy"
      maxRuleDurationInMins: 3
      maxScanDurationInMins: 15

  - type: report
    parameters:
      template: "traditional-html"
      reportDir: "/zap/wrk/zap"
      reportFile: "report-auth.html"

  - type: report
    parameters:
      template: "traditional-json"
      reportDir: "/zap/wrk/zap"
      reportFile: "zap-report-auth.json"
